version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "src/Auth0.MyOrganizationApi"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    labels:
      - "deps:nuget"

  - package-ecosystem: "nuget"
    directory: "src/Auth0.MyOrganizationApi.Test"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    labels:
      - "deps:nuget"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    labels:
      - "deps:github-actions"